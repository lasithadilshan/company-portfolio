<!-- Hero Section -->
<div class="container py-5">
<div class="wrapper position-relative">
  <div class="text-center mb-5 hero-about position-relative">
    <h1 class="display-4 fw-bold text-white">Contact Us</h1>
    <p class="lead text-white">We're here to assist you. Reach out to us through any of the methods below.</p>
  </div>
</div>

<!-- Contact Section -->

  <div class="row g-5">
    <!-- Contact Form -->
    <div class="col-md-6">
      <h2 class="mb-4">Send Us a Message</h2>
      <form>
        <div class="mb-3">
          <label for="name" class="form-label">Name</label>
          <input type="text" class="form-control" id="name" placeholder="Your Name">
        </div>
        <div class="mb-3">
          <label for="email" class="form-label">Email</label>
          <input type="email" class="form-control" id="email" placeholder="you@example.com">
        </div>
        <div class="mb-3">
          <label for="subject" class="form-label">Subject</label>
          <input type="text" class="form-control" id="subject" placeholder="Subject">
        </div>
        <div class="mb-3">
          <label for="message" class="form-label">Message</label>
          <textarea class="form-control" id="message" rows="5" placeholder="Your message..."></textarea>
        </div>
        <button type="submit" class="btn dd-btn dd-btn-primary">Submit</button>
      </form>
    </div>

    <!-- Contact Details -->
    <div class="col-md-6">
      <h2 class="mb-4">Get in Touch</h2>
      <p><i class="bi bi-geo-alt-fill mr-2"></i>123 Main Street, Colombo, Sri Lanka</p>
      <p><i class="bi bi-telephone-fill mr-2"></i>+94 11 234 5678</p>
      <p><i class="bi bi-envelope-fill mr-2"></i>info@yourcompany.com</p>
      <p><i class="bi bi-clock-fill mr-2"></i>Monday - Friday: 9:00 AM - 6:00 PM</p>
      <div class="mt-4">
        <h5>Follow Us</h5>
        <a href="#" class="mr-3"><i class="bi bi-facebook fs-4"></i></a>
        <a href="#" class="mr-3"><i class="bi bi-twitter fs-4"></i></a>
        <a href="#" class="mr-3"><i class="bi bi-linkedin fs-4"></i></a>
        <a href="#"><i class="bi bi-instagram fs-4"></i></a>
      </div>
    </div>
  </div>
</div>
